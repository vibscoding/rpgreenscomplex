<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — RP Greens Complex</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:linear-gradient(135deg,#07152b 0%,#0d2a14 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .box{background:#fff;border-radius:20px;padding:2.8rem 2.5rem;width:100%;max-width:400px;box-shadow:0 40px 100px rgba(0,0,0,0.4);}
    .logo{display:flex;align-items:center;gap:0.7rem;margin-bottom:2rem;justify-content:center;}
    .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#166534,#16a34a);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#fff;}
    .logo-text{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#07152b;line-height:1.1;}
    .logo-text span{display:block;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:#6b7280;font-weight:400;}
    h2{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:#07152b;text-align:center;margin-bottom:0.3rem;}
    .sub{font-size:0.8rem;color:#9ca3af;text-align:center;margin-bottom:2rem;}
    label{display:block;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#6b7280;margin-bottom:0.35rem;margin-top:1.1rem;}
    input{width:100%;padding:0.8rem 1rem;border:1.5px solid #e5e7eb;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;color:#111;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:#16a34a;}
    .error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:0.7rem 1rem;border-radius:8px;font-size:0.82rem;margin-top:1rem;}
    button{margin-top:1.8rem;width:100%;background:#166534;color:#fff;border:none;padding:0.95rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;font-weight:600;border-radius:8px;cursor:pointer;transition:background 0.2s;}
    button:hover{background:#15803d;}
    .back{display:block;text-align:center;margin-top:1.3rem;font-size:0.78rem;color:#9ca3af;text-decoration:none;transition:color 0.2s;}
    .back:hover{color:#166534;}
    .hint{font-size:0.72rem;color:#d1d5db;text-align:center;margin-top:1rem;}
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <div class="logo-icon">RP</div>
      <div class="logo-text">RP Greens Complex<span>Admin Portal</span></div>
    </div>
    <h2>Welcome Back</h2>
    <p class="sub">Sign in to manage inquiries</p>
    <form action="/admin" method="POST">
      <label for="user">Username</label>
      <input type="text" name="user" id="user" placeholder="admin" required autocomplete="username"/>
      <label for="pass">Password</label>
      <input type="password" name="pass" id="pass" placeholder="••••••••" required autocomplete="current-password"/>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <button type="submit">Sign In →</button>
    </form>
    <a href="/" class="back">← Back to Website</a>
    <p class="hint">Default: admin / rpgreens2026</p>
  </div>
</body>
</html>
